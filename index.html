<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Calendar To-Do Manager</title>
<style>
:root{
  --bg:#0d0008;--bg2:#160010;--bg3:#1e0016;
  --cell:#180010;--chov:#220016;
  --bdr:#380020;--bdrh:#72003c;
  --rose:#ff1a70;--rdim:#aa0048;--rpale:#ff80b0;
  --txt:#f0ccd8;--txt2:#b07888;--txt3:#6a3848;--txd:#3a1828;
  --high:#ef4444;--med:#f59e0b;--low:#22c55e;
  --work:#3b82f6;--pers:#06b6d4;--hlth:#ec4899;--othr:#f97316;
  --r:8px;--rs:4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}

/* ── Header ── */
#hdr{
  height:50px;background:var(--bg2);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;gap:.6rem;padding:0 .9rem;flex-shrink:0;
}
#monthLbl{font-size:1.05rem;font-weight:700;color:var(--rpale);min-width:158px}
.btn{
  background:var(--bg3);border:1px solid var(--bdr);color:var(--txt2);
  padding:.3rem .65rem;border-radius:var(--rs);cursor:pointer;font-size:.75rem;
  font-weight:600;transition:all .12s;white-space:nowrap;font-family:inherit;
}
.btn:hover{border-color:var(--bdrh);color:var(--txt)}
.btn-r{background:var(--rdim);border-color:var(--rose);color:#fff}
.btn-r:hover{background:var(--rose)}
.legend{display:flex;align-items:center;gap:.6rem;flex:1;overflow:hidden;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:.22rem;font-size:.65rem;color:var(--txt2);white-space:nowrap}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.prog-wrap{display:flex;align-items:center;gap:.35rem;white-space:nowrap}
.prog-lbl{font-size:.68rem;color:var(--txt2)}
.prog-bar{width:72px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--rdim),var(--rose));border-radius:2px;transition:width .3s}
.fab{
  width:30px;height:30px;border-radius:50%;background:var(--rdim);border:none;
  color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;
  justify-content:center;box-shadow:0 2px 10px rgba(170,0,72,.5);flex-shrink:0;
  transition:background .12s;
}
.fab:hover{background:var(--rose)}

/* ── Body ── */
#body{display:flex;height:calc(100vh - 50px);overflow:hidden}

/* ── Calendar ── */
#calWrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
#dayNames{
  display:grid;grid-template-columns:repeat(7,1fr);
  background:var(--bg2);border-bottom:1px solid var(--bdr);flex-shrink:0;
}
.dn{text-align:center;padding:.35rem;font-size:.65rem;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em}
#calGrid{
  display:grid;grid-template-columns:repeat(7,1fr);
  grid-template-rows:repeat(6,1fr);flex:1;gap:1px;background:var(--bdr);
}

/* ── Day Cell ── */
.dc{
  background:var(--cell);padding:5px 4px;overflow:hidden;
  display:flex;flex-direction:column;gap:2px;cursor:pointer;
  transition:background .1s;min-height:0;position:relative;
}
.dc:hover{background:var(--chov)}
.dc.om{background:var(--bg)}
.dc.om .cdn{color:var(--txd)}
.dc.tod{background:#200018;box-shadow:inset 0 0 0 1.5px var(--rose)}
.dc.tod .cdn{color:var(--rpale);font-weight:700}
.dc.dov{background:rgba(170,0,72,.15);box-shadow:inset 0 0 0 1.5px var(--rose)}
.cdn{font-size:.7rem;font-weight:600;color:var(--txt2);line-height:1;flex-shrink:0}

/* ── Chips ── */
.chip{
  border-radius:3px;padding:2px 4px 2px 6px;font-size:.6rem;font-weight:500;
  background:rgba(255,255,255,.055);border-left:2.5px solid #555;
  display:flex;align-items:center;gap:3px;cursor:pointer;
  white-space:nowrap;overflow:hidden;flex-shrink:0;
  transition:background .1s;position:relative;
}
.chip:hover{background:rgba(255,255,255,.1)}
.chip.done{opacity:.38}
.chip.done .cht{text-decoration:line-through}
.chip.ov{animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.chdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cht{flex:1;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.chtm{color:var(--txt3);font-size:.57rem;flex-shrink:0}
.chrp{flex-shrink:0;font-size:.58rem}
.chx{
  display:none;position:absolute;right:2px;top:50%;transform:translateY(-50%);
  background:rgba(0,0,0,.6);border:none;color:#ddd;border-radius:2px;
  padding:0 2px;font-size:.57rem;cursor:pointer;line-height:1.5;
}
.chip:hover .chx{display:block}
.more{font-size:.58rem;color:var(--txt3);padding:1px 3px;user-select:none}

/* ── Sidebar ── */
#sb{
  width:240px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--bdr);
  display:flex;flex-direction:column;overflow:hidden;transition:width .2s;
}
#sb.closed{width:0;border:none;overflow:hidden}
.sb-hdr{
  padding:.55rem .85rem;border-bottom:1px solid var(--bdr);
  font-size:.75rem;font-weight:700;color:var(--rpale);flex-shrink:0;
}
#agList{flex:1;overflow-y:auto;padding:.35rem}
.ag-sec{font-size:.6rem;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;padding:.35rem .3rem .15rem}
.ag-ov{color:#ef4444 !important}
.ag-item{
  padding:.4rem .5rem;border-radius:var(--rs);cursor:pointer;
  margin-bottom:2px;border-left:2.5px solid transparent;
  background:var(--cell);transition:background .1s;
}
.ag-item:hover{background:var(--chov)}
.ag-item.done .ag-t{text-decoration:line-through;opacity:.45}
.ag-t{font-size:.73rem;font-weight:600;color:var(--txt)}
.ag-m{font-size:.62rem;color:var(--txt3);display:flex;gap:.3rem;align-items:center;margin-top:2px}
.ag-dl{color:var(--rpale);font-weight:600}

/* ── Detail Panel ── */
#det{
  position:fixed;right:0;top:0;bottom:0;width:290px;
  background:var(--bg2);border-left:1px solid var(--bdrh);
  z-index:300;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .22s ease;
  box-shadow:-6px 0 28px rgba(0,0,0,.55);
}
#det.open{transform:translateX(0)}
.det-hdr{padding:.8rem .95rem;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;gap:.5rem}
#detTitle{flex:1;font-size:.9rem;font-weight:700;color:var(--txt);word-break:break-word}
.det-x{background:none;border:none;color:var(--txt3);font-size:.95rem;cursor:pointer;flex-shrink:0;margin-top:1px}
.det-x:hover{color:var(--txt)}
.det-body{padding:.8rem .95rem;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:.6rem}
.det-foot{padding:.55rem .95rem .8rem;border-top:1px solid var(--bdr);display:flex;flex-direction:column;gap:.35rem}
.det-meta{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.det-inf{font-size:.72rem;color:var(--txt2)}
.det-inf b{color:var(--txt)}
.badge{
  display:inline-flex;align-items:center;gap:.22rem;
  padding:.16rem .48rem;border-radius:20px;font-size:.64rem;font-weight:700;border:1px solid;
}
.bhi{color:var(--high);border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.1)}
.bmd{color:var(--med);border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.1)}
.blo{color:var(--low);border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.1)}
.bfw{width:100%;text-align:center;justify-content:center}
.bgn{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);color:var(--low)}
.bgn:hover{background:rgba(34,197,94,.2)}
.brd{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.4);color:var(--high)}
.brd:hover{background:rgba(239,68,68,.2)}
.bbl{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.4);color:#60a5fa}
.bbl:hover{background:rgba(59,130,246,.2)}

/* ── Modal ── */
#back{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:400;display:none;align-items:center;justify-content:center;padding:1rem}
#back.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bdrh);border-radius:var(--r);width:100%;max-width:420px;box-shadow:0 10px 40px rgba(0,0,0,.7);animation:su .17s ease}
@keyframes su{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.m-hdr{padding:.85rem 1.05rem .65rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)}
.m-tit{font-size:.88rem;font-weight:700;color:var(--rpale)}
.m-x{background:none;border:none;color:var(--txt3);font-size:.95rem;cursor:pointer}
.m-x:hover{color:var(--txt)}
.m-body{padding:.85rem 1.05rem;display:flex;flex-direction:column;gap:.6rem}
.m-foot{padding:.6rem 1.05rem .85rem;display:flex;gap:.45rem;justify-content:flex-end}
label{font-size:.7rem;font-weight:600;color:var(--txt2);display:block;margin-bottom:.2rem}
input[type=text],input[type=date],input[type=time],select,textarea{
  width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rs);
  color:var(--txt);padding:.42rem .58rem;font-size:.78rem;font-family:inherit;outline:none;transition:border-color .12s;
}
input:focus,select:focus,textarea:focus{border-color:var(--bdrh)}
textarea{resize:vertical;min-height:54px}
select option{background:var(--bg2)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem}

/* ── Snack ── */
#snk{
  position:fixed;bottom:1.1rem;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--bg2);border:1px solid var(--bdrh);color:var(--txt);
  padding:.5rem .95rem;border-radius:var(--r);font-size:.78rem;font-weight:600;
  box-shadow:0 6px 24px rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:all .2s;z-index:999;
}
#snk.on{opacity:1;transform:translateX(-50%) translateY(0)}
*{scrollbar-width:thin;scrollbar-color:var(--bdr) transparent}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

@media(max-width:680px){
  .legend{display:none}
  #sb{position:fixed;right:0;top:0;bottom:0;z-index:250;transform:translateX(100%);transition:transform .2s;border-left:1px solid var(--bdrh)}
  #sb.mob{transform:translateX(0);width:240px !important}
  #det{width:100%}
}
</style>
</head>
<body>

<div id="hdr">
  <button class="btn" onclick="toggleSb()" style="font-size:.85rem;padding:.3rem .5rem">☰</button>
  <div style="display:flex;align-items:center;gap:.35rem">
    <button class="btn" onclick="nav(-1)">‹</button>
    <span id="monthLbl"></span>
    <button class="btn" onclick="nav(1)">›</button>
    <button class="btn" onclick="goToday()" style="margin-left:.15rem">Today</button>
  </div>
  <div class="legend">
    <span class="li"><span class="ld" style="background:var(--high)"></span>High</span>
    <span class="li"><span class="ld" style="background:var(--med)"></span>Medium</span>
    <span class="li"><span class="ld" style="background:var(--low)"></span>Low</span>
    <span class="li"><span class="ld" style="background:var(--work)"></span>Work</span>
    <span class="li"><span class="ld" style="background:var(--pers)"></span>Personal</span>
    <span class="li"><span class="ld" style="background:var(--hlth)"></span>Health</span>
    <span class="li"><span class="ld" style="background:var(--othr)"></span>Other</span>
  </div>
  <div class="prog-wrap">
    <span class="prog-lbl" id="progLbl">0/0</span>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <button class="fab" onclick="openAdd(null)" title="Add task">+</button>
</div>

<div id="body">
  <div id="calWrap">
    <div id="dayNames">
      <div class="dn">Sun</div><div class="dn">Mon</div><div class="dn">Tue</div>
      <div class="dn">Wed</div><div class="dn">Thu</div><div class="dn">Fri</div><div class="dn">Sat</div>
    </div>
    <div id="calGrid"></div>
  </div>
  <div id="sb">
    <div class="sb-hdr">Agenda</div>
    <div id="agList"></div>
  </div>
</div>

<!-- Detail Panel -->
<div id="det">
  <div class="det-hdr">
    <div id="detTitle"></div>
    <button class="det-x" onclick="closeDet()">✕</button>
  </div>
  <div class="det-body" id="detBody"></div>
  <div class="det-foot" id="detFoot"></div>
</div>

<!-- Modal -->
<div id="back" onclick="backClick(event)">
  <div class="modal">
    <div class="m-hdr"><span class="m-tit" id="mTit">Add Task</span><button class="m-x" onclick="closeMod()">✕</button></div>
    <div class="m-body">
      <div><label>Title *</label><input type="text" id="fTit" placeholder="What needs to be done?"/></div>
      <div class="fr2">
        <div><label>Date</label><input type="date" id="fDt"/></div>
        <div><label>Time</label><input type="time" id="fTm"/></div>
      </div>
      <div class="fr3">
        <div><label>Priority</label>
          <select id="fPri"><option value="med">Medium</option><option value="high">High</option><option value="low">Low</option></select>
        </div>
        <div><label>Tag</label>
          <select id="fTag"><option value="Work">Work</option><option value="Personal">Personal</option><option value="Health">Health</option><option value="Other">Other</option></select>
        </div>
        <div><label>Repeat</label>
          <select id="fRep"><option value="none">None</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select>
        </div>
      </div>
      <div><label>Notes</label><textarea id="fNot" placeholder="Add notes…"></textarea></div>
    </div>
    <div class="m-foot">
      <button class="btn" onclick="closeMod()">Cancel</button>
      <button class="btn btn-r" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<div id="snk"></div>

<script>
// ── State ──────────────────────────────────────────────────────────
let tasks   = JSON.parse(localStorage.getItem('ctm3')||'[]');
let vY, vM;          // viewed year / month
let editId  = null;
let detId   = null;
let dragId  = null;
let sbOpen  = true;

const TODAY = todayStr();

const PC = {high:'#ef4444',med:'#f59e0b',low:'#22c55e'};
const TC = {Work:'#3b82f6',Personal:'#06b6d4',Health:'#ec4899',Other:'#f97316'};
const PL = {high:'High',med:'Medium',low:'Low'};
const PB = {high:'bhi',med:'bmd',low:'blo'};

function todayStr(){ return new Date().toISOString().slice(0,10) }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6) }
function save(){ localStorage.setItem('ctm3',JSON.stringify(tasks)) }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function fmtDate(s){
  if(!s) return '';
  const [y,m,d]=s.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function fmtTime(t){
  if(!t) return '';
  const [h,m]=t.split(':').map(Number);
  return `${h%12||12}:${String(m).padStart(2,'0')}${h>=12?'pm':'am'}`;
}
function dlabel(s){
  if(s===TODAY) return 'Today';
  const tom=new Date(); tom.setDate(tom.getDate()+1);
  if(s===tom.toISOString().slice(0,10)) return 'Tomorrow';
  return fmtDate(s);
}

// ── Recurring ──────────────────────────────────────────────────────
function tasksForDate(ds){
  const out=[];
  tasks.forEach(t=>{
    if(t.date===ds){ out.push({...t,_v:false}); return; }
    if(t.repeat && t.repeat!=='none' && t.date<ds){
      const o=new Date(t.date+'T00:00:00');
      const c=new Date(ds+'T00:00:00');
      const diff=Math.round((c-o)/86400000);
      let ok=false;
      if(t.repeat==='daily') ok=diff>0;
      else if(t.repeat==='weekly') ok=diff>0&&diff%7===0;
      else if(t.repeat==='monthly') ok=c.getDate()===o.getDate()&&diff>0;
      if(ok) out.push({...t,date:ds,_v:true});
    }
  });
  out.sort((a,b)=>{
    if(a.time&&b.time) return a.time.localeCompare(b.time);
    if(a.time) return -1; if(b.time) return 1; return 0;
  });
  return out;
}

// ── Render ─────────────────────────────────────────────────────────
function init(){
  const n=new Date(); vY=n.getFullYear(); vM=n.getMonth();
  render();
}
function nav(d){ vM+=d; if(vM>11){vM=0;vY++} if(vM<0){vM=11;vY--} render() }
function goToday(){ const n=new Date(); vY=n.getFullYear(); vM=n.getMonth(); render() }
function render(){ renderHdr(); renderGrid(); renderAgenda() }

function renderHdr(){
  document.getElementById('monthLbl').textContent=
    new Date(vY,vM,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const ms=`${vY}-${String(vM+1).padStart(2,'0')}`;
  const mt=tasks.filter(t=>t.date&&t.date.startsWith(ms));
  const tot=mt.length, done=mt.filter(t=>t.done).length;
  document.getElementById('progLbl').textContent=`${done}/${tot}`;
  document.getElementById('progFill').style.width=tot?`${(done/tot)*100}%`:'0%';
}

function renderGrid(){
  const grid=document.getElementById('calGrid');
  const first=new Date(vY,vM,1).getDay();
  const dim=new Date(vY,vM+1,0).getDate();
  const prev=new Date(vY,vM,0).getDate();
  let html='';
  for(let i=0;i<42;i++){
    let day,mo,yr,other=false;
    if(i<first){
      day=prev-first+1+i; mo=vM-1; yr=vY; other=true;
      if(mo<0){mo=11;yr--}
    } else if(i-first>=dim){
      day=i-first-dim+1; mo=vM+1; yr=vY; other=true;
      if(mo>11){mo=0;yr++}
    } else { day=i-first+1; mo=vM; yr=vY }
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=ds===TODAY;
    let cls='dc'+(other?' om':'')+(isToday?' tod':'');
    const dt=tasksForDate(ds);
    const MAX=4, shown=dt.slice(0,MAX), extra=dt.length-MAX;
    const chips=shown.map(t=>{
      const ov=!t.done&&t.date<TODAY?' ov':'';
      const drag=!t._v?'draggable="true" ondragstart="dstart(event,\''+t.id+'\')"\n':' ';
      return `<div class="chip${t.done?' done':''}${ov}"
        style="border-left-color:${PC[t.priority]||PC.med}"
        onclick="event.stopPropagation();openDet('${t.id}')"
        ${drag}
        data-id="${t.id}">
        <span class="chdot" style="background:${TC[t.tag]||TC.Other}"></span>
        <span class="cht">${esc(t.title)}</span>
        ${t.time?`<span class="chtm">${fmtTime(t.time)}</span>`:''}
        ${t.repeat&&t.repeat!=='none'?`<span class="chrp">🔁</span>`:''}
        ${!t._v?`<button class="chx" onclick="event.stopPropagation();qdel('${t.id}')">✕</button>`:''}
      </div>`;
    }).join('');
    const more=extra>0?`<div class="more">+${extra} more</div>`:'';
    html+=`<div class="${cls}" data-date="${ds}"
      onclick="cellClick('${ds}')"
      ondragover="dov(event)" ondragleave="dlv(event)" ondrop="drop(event,'${ds}')">
      <div class="cdn">${day}</div>${chips}${more}
    </div>`;
  }
  grid.innerHTML=html;
}

// ── Agenda ─────────────────────────────────────────────────────────
function renderAgenda(){
  const al=document.getElementById('agList');
  let html='';
  // Overdue
  const ov=tasks.filter(t=>!t.done&&t.date&&t.date<TODAY)
    .sort((a,b)=>a.date.localeCompare(b.date));
  if(ov.length){
    html+=`<div class="ag-sec ag-ov">⚠ Overdue</div>`;
    ov.forEach(t=>{ html+=agI(t,'Overdue · '+fmtDate(t.date)) });
  }
  // Next 14 days
  for(let i=0;i<14;i++){
    const d=new Date(); d.setDate(d.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    const dt=tasksForDate(ds);
    if(!dt.length) continue;
    html+=`<div class="ag-sec">${dlabel(ds)}</div>`;
    dt.forEach(t=>{ html+=agI(t,t.time?fmtTime(t.time):'') });
  }
  if(!html) html='<div style="padding:.7rem;font-size:.72rem;color:var(--txt3)">No upcoming tasks</div>';
  al.innerHTML=html;
}

function agI(t,meta){
  const p=t.priority||'med';
  return `<div class="ag-item${t.done?' done':''}"
    style="border-left-color:${PC[p]}"
    onclick="openDet('${t.id}')">
    <div class="ag-t">${esc(t.title)}</div>
    <div class="ag-m">
      <span class="chdot" style="background:${TC[t.tag]||TC.Other}"></span>
      ${meta?`<span>${meta}</span>`:''}
      ${t.tag?`<span style="color:${TC[t.tag]||TC.Other}">${t.tag}</span>`:''}
    </div>
  </div>`;
}

// ── Cell click ─────────────────────────────────────────────────────
function cellClick(ds){ openAdd(ds) }

// ── Modal ──────────────────────────────────────────────────────────
function openAdd(ds){
  editId=null;
  document.getElementById('mTit').textContent='Add Task';
  document.getElementById('fTit').value='';
  document.getElementById('fDt').value=ds||TODAY;
  document.getElementById('fTm').value='';
  document.getElementById('fPri').value='med';
  document.getElementById('fTag').value='Work';
  document.getElementById('fRep').value='none';
  document.getElementById('fNot').value='';
  document.getElementById('back').classList.add('on');
  setTimeout(()=>document.getElementById('fTit').focus(),80);
}

function openEdit(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  editId=id;
  document.getElementById('mTit').textContent='Edit Task';
  document.getElementById('fTit').value=t.title;
  document.getElementById('fDt').value=t.date||'';
  document.getElementById('fTm').value=t.time||'';
  document.getElementById('fPri').value=t.priority||'med';
  document.getElementById('fTag').value=t.tag||'Work';
  document.getElementById('fRep').value=t.repeat||'none';
  document.getElementById('fNot').value=t.notes||'';
  document.getElementById('back').classList.add('on');
  setTimeout(()=>document.getElementById('fTit').focus(),80);
}

function closeMod(){ document.getElementById('back').classList.remove('on'); editId=null }
function backClick(e){ if(e.target.id==='back') closeMod() }

function saveTask(){
  const title=document.getElementById('fTit').value.trim();
  if(!title){ document.getElementById('fTit').focus(); return }
  const d={
    title, date:document.getElementById('fDt').value,
    time:document.getElementById('fTm').value,
    priority:document.getElementById('fPri').value,
    tag:document.getElementById('fTag').value,
    repeat:document.getElementById('fRep').value,
    notes:document.getElementById('fNot').value.trim()
  };
  if(editId){
    Object.assign(tasks.find(t=>t.id===editId),d);
    snack('Task updated');
  } else {
    tasks.unshift({id:uid(),done:false,...d});
    snack('Task added!');
  }
  save(); closeMod(); render();
  if(detId) renderDet(detId);
}

// ── Detail Panel ───────────────────────────────────────────────────
function openDet(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  detId=id; renderDet(id);
  document.getElementById('det').classList.add('open');
}

function renderDet(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  document.getElementById('detTitle').textContent=t.title;
  const tc=TC[t.tag]||TC.Other;
  document.getElementById('detBody').innerHTML=`
    <div class="det-meta">
      <span class="badge ${PB[t.priority]||'bmd'}">${PL[t.priority]||'Medium'}</span>
      ${t.tag?`<span class="badge" style="border-color:${tc}44;color:${tc};background:${tc}18">${t.tag}</span>`:''}
      ${t.done?`<span class="badge" style="border-color:rgba(34,197,94,.4);color:#22c55e;background:rgba(34,197,94,.1)">✓ Done</span>`:''}
      ${!t.done&&t.date&&t.date<TODAY?`<span class="badge" style="border-color:rgba(239,68,68,.4);color:#ef4444;background:rgba(239,68,68,.1)">⚠ Overdue</span>`:''}
    </div>
    ${t.date?`<div class="det-inf">📅 <b>${fmtDate(t.date)}${t.time?' · '+fmtTime(t.time):''}</b></div>`:''}
    ${t.repeat&&t.repeat!=='none'?`<div class="det-inf">🔁 Repeats <b>${t.repeat}</b></div>`:''}
    <div>
      <label>Notes</label>
      <textarea id="detNot" style="min-height:76px" onblur="saveNotes('${id}')">${esc(t.notes||'')}</textarea>
    </div>
  `;
  document.getElementById('detFoot').innerHTML=`
    <button class="btn bfw bgn" onclick="togDone('${id}')">${t.done?'↩ Mark Undone':'✓ Mark Done'}</button>
    <button class="btn bfw" onclick="openEdit('${id}')">✎ Edit Task</button>
    <button class="btn bfw bbl" onclick="expOne('${id}')">📅 Add to Calendar (.ics)</button>
    <button class="btn bfw brd" onclick="delTask('${id}')">🗑 Delete Task</button>
  `;
}

function saveNotes(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  const el=document.getElementById('detNot'); if(!el) return;
  t.notes=el.value.trim(); save();
}

function closeDet(){ document.getElementById('det').classList.remove('open'); detId=null }

function togDone(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  t.done=!t.done; save(); render(); renderDet(id);
  snack(t.done?'Task completed!':'Task reopened');
}

function delTask(id){
  if(!confirm('Delete this task?')) return;
  tasks=tasks.filter(t=>t.id!==id);
  save(); render(); closeDet(); snack('Task deleted');
}

function qdel(id){
  tasks=tasks.filter(t=>t.id!==id);
  save(); render(); snack('Task deleted');
}

// ── Drag & Drop ────────────────────────────────────────────────────
function dstart(e,id){ dragId=id; e.dataTransfer.effectAllowed='move' }
function dov(e){ e.preventDefault(); e.currentTarget.classList.add('dov') }
function dlv(e){ e.currentTarget.classList.remove('dov') }
function drop(e,ds){
  e.preventDefault(); e.currentTarget.classList.remove('dov');
  if(!dragId) return;
  const t=tasks.find(x=>x.id===dragId);
  if(t){ t.date=ds; save(); render(); snack('Task moved') }
  dragId=null;
}

// ── Sidebar ────────────────────────────────────────────────────────
function toggleSb(){
  sbOpen=!sbOpen;
  const sb=document.getElementById('sb');
  if(window.innerWidth<=680){
    sb.classList.toggle('mob',sbOpen);
    sb.classList.remove('closed');
  } else {
    sb.classList.toggle('closed',!sbOpen);
  }
}

// ── iCal export ────────────────────────────────────────────────────
function expOne(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  const now=new Date().toISOString().replace(/[-:.]/g,'').slice(0,15)+'Z';
  const dts=t.date
    ?(t.time?`DTSTART:${t.date.replace(/-/g,'')}T${t.time.replace(':','')}00`
             :`DTSTART;VALUE=DATE:${t.date.replace(/-/g,'')}`)
    :`DTSTART;VALUE=DATE:${TODAY.replace(/-/g,'')}`;
  const ic=[
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//CTM//EN',
    'BEGIN:VEVENT',`UID:${t.id}@ctm`,`DTSTAMP:${now}`,dts,
    `SUMMARY:${ie(t.title)}`,
    t.notes?`DESCRIPTION:${ie(t.notes)}`:'',
    `CATEGORIES:${t.tag||'Other'}`,
    `PRIORITY:${t.priority==='high'?1:t.priority==='low'?9:5}`,
    'END:VEVENT','END:VCALENDAR'
  ].filter(Boolean).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([ic],{type:'text/calendar'}));
  a.download=`${(t.title||'task').slice(0,28).replace(/\s+/g,'-')}.ics`;
  a.click(); snack('Exported to .ics!');
}
function ie(s){ return String(s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n') }

// ── Snackbar ───────────────────────────────────────────────────────
let snkT;
function snack(msg){
  const el=document.getElementById('snk');
  el.textContent=msg; el.classList.add('on');
  clearTimeout(snkT); snkT=setTimeout(()=>el.classList.remove('on'),2200);
}

// ── Keyboard ───────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeMod(); closeDet() }
  if(e.key==='Enter'&&document.getElementById('back').classList.contains('on')){
    if(document.activeElement.tagName!=='TEXTAREA'&&document.activeElement.tagName!=='SELECT') saveTask();
  }
});

init();
</script>
</body>
</html>
